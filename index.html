<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медицинское и Языковое Тестирование</title>
    <style>
        /* Полностью черная/темная тема */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }

        .description {
            color: #888;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Навигация по темам */
        .theme-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: #1e1e1e;
            color: #b0b0b0;
            border: 2px solid #333;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            border-color: #00adb5;
            color: #fff;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: #fff;
            border-color: #00adb5;
            box-shadow: 0 0 15px rgba(0, 173, 181, 0.4);
        }

        /* Контейнер для карточки вопроса */
        .quiz-container {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .question-number {
            color: #00adb5;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .question-text {
            font-size: 20px;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #ffffff;
        }

        /* Кнопки вариантов ответов */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #252525;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #2d2d2d;
            border-color: #555;
        }

        /* Стили при проверке */
        .option-btn.correct {
            background-color: #1b5e20 !important;
            border-color: #4caf50 !important;
            color: #fff;
        }

        .option-btn.wrong {
            background-color: #b71c1c !important;
            border-color: #f44336 !important;
            color: #fff;
        }

        /* Нижняя панель управления */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .score-track {
            color: #888;
            font-size: 14px;
        }

        .next-btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            display: none; /* Покажется только после выбора ответа */
        }

        .next-btn:hover {
            background-color: #444;
        }

        /* Финальный экран результатов темы */
        .result-screen {
            text-align: center;
            padding: 20px 0;
        }

        .result-score {
            font-size: 48px;
            color: #00adb5;
            margin: 20px 0;
            font-weight: bold;
        }

        .restart-btn {
            background-color: #00adb5;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .restart-btn:hover {
            background-color: #008c95;
        }
    </style>
</head>
<body>

    <h1>Онлайн Тестирование</h1>
    <div class="description">Выберите тему ниже, чтобы начать прохождение тестов</div>

    <div class="theme-tabs">
        <button class="tab-btn active" onclick="switchTheme(1)">Тема 1</button>
        <button class="tab-btn" onclick="switchTheme(2)">Тема 2</button>
        <button class="tab-btn" onclick="switchTheme(3)">Тема 3</button>
    </div>

    <div class="quiz-container" id="quiz-card">
        </div>

    <script>
        // База данных вопросов из присланного документа
        const questionsData = {
            1: [ // ТЕМА 1 (Обычные по 4 варианта, ДА/НЕТ по 2 варианта)
                {
                    q: 'Как переводится слово "Горький" на узбекский язык?',
                    options: ['Achchiq', 'Shirin', 'Nordon', 'Sho\'r'],
                    correct: 0
                },
                {
                    q: 'Верно ли, что выражение "Sog\'lom turmush uzoq umr manbai" переводится на русский как "В здоровом теле здоровый дух"?',
                    options: ['ДА (Верно)', 'НЕТ (Неверно)'],
                    correct: 0
                },
                {
                    q: 'Укажите точный перевод анатомического термина "Матка" на узбекский язык.',
                    options: ['Bo\'g\'im', 'Mushak', 'Bachadon', 'Bodom bezlari'],
                    correct: 2
                },
                {
                    q: 'O\'pka to\'qimalarining, ko\'pincha alveolalarning yallig'lanishi bilan kechadigan kasallik qaysi?',
                    options: ['Qizilcha', 'Zotiljam (Pnevmoniya)', 'Suvchechak', 'Gepatit'],
                    correct: 1
                },
                {
                    q: 'Верно ли, что узбекское слово "O\'sma" переводится на русский язык как "Осложнение"?',
                    options: ['ДА', 'НЕТ (Это означает опухоль)'],
                    correct: 1
                },
                {
                    q: '"Saida bu shoirning she\'rlarini, dostonlarini sevib o\'qiydi." Bu gapda qaysi gap bo\'lagi uyushgan?',
                    options: ['Ega', 'To\'ldiruvchi', 'Aniqlovchi', 'Hol'],
                    correct: 1
                },
                {
                    q: 'К какому разряду относятся модальные слова: "Balki, ehtimol, chamasi, shekilli"?',
                    options: ['Fikrning tartibi', 'Fikrning tasdig\'i', 'Gumon (Сомнение/Предположение)', 'Afsuslanish'],
                    correct: 2
                }
            ],
            2: [ // ТЕМА 2
                {
                    q: 'Как переводится слово "Последствие" (Asorat) на узбекский язык?',
                    options: ['Asorat', 'Xulq-atvor', 'E\'tiborsizlik', 'Halollik'],
                    correct: 0
                },
                {
                    q: 'Является ли верным перевод пословицы: "Хороший друг познается в беде" -> "Yaxshi do\'st kulfatda bilinadi"?',
                    options: ['ДА', 'НЕТ'],
                    correct: 0
                },
                {
                    q: 'Укажите перевод термина "Щитовидная железа" на узбекский язык.',
                    options: ['Oshqozon osti bezi', 'So\'lak bezlari', 'Qalqonsimon bez', 'O\'t pufagi'],
                    correct: 2
                },
                {
                    q: '"Пищевод взрослого человека имеет длину 25-30 см" gapida insonning qaysi a\'zosi haqida aytilgan?',
                    options: ['Halqum', 'Qizilo\'ngach', 'So\'lak bezlari', 'O\'t pufagi'],
                    correct: 1
                }
            ],
            3: [ // ТЕМА 3
                {
                    q: 'Qaysi javobda ayiruv bog\'lovchilari berilgan?',
                    options: ['Va, hamda, bilan', 'Ammo, lekin, biroq', 'Yoki, yo, yoxud', 'Na...na'],
                    correct: 2
                },
                {
                    q: 'Слово "orqali" относится к категории союзов (Bog\'lovchi)?',
                    options: ['ДА', 'НЕТ (Это послелог — Ko\'makchi)'],
                    correct: 1
                },
                {
                    q: 'В каком предложении употреблен соединительный союз "hamda"?',
                    options: ['Biriktiruv bog\'lovchisi qatnashgan gap', 'Zidlov bog\'lovchisi qatnashgan gap', 'Ayiruv bog\'lovchisi qatnashgan gap', 'Inkor bog\'lovchisi qatnashgan gap'],
                    correct: 0
                }
            ]
        };

        let currentTheme = 1;
        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        const quizCard = document.getElementById('quiz-card');

        // Функция инициализации и отрисовки вопроса
        function renderQuestion() {
            canAnswer = true;
            const questions = questionsData[currentTheme];
            
            // Если вопросы в теме закончились, показываем результаты
            if (currentQuestionIndex >= questions.length) {
                renderResults();
                return;
            }

            const currentQ = questions[currentQuestionIndex];

            let optionsHtml = '';
            currentQ.options.forEach((option, index) => {
                optionsHtml += `
                    <button class="option-btn" onclick="checkAnswer(${index}, this)">
                        ${option}
                    </button>
                `;
            });

            quizCard.innerHTML = `
                <div class="question-number">Тема ${currentTheme} • Вопрос ${currentQuestionIndex + 1} из ${questions.length}</div>
                <div class="question-text">${currentQ.q}</div>
                <div class="options-list">
                    ${optionsHtml}
                </div>
                <div class="controls">
                    <div class="score-track">Правильно: ${score}</div>
                    <button class="next-btn" id="next-button" onclick="nextQuestion()">Дальше</button>
                </div>
            `;
        }

        // Функция проверки ответа
        function checkAnswer(selectedIndex, btnElement) {
            if (!canAnswer) return; // Запрещаем кликать дважды
            canAnswer = false;

            const questions = questionsData[currentTheme];
            const currentQ = questions[currentQuestionIndex];
            const allButtons = document.querySelectorAll('.option-btn');

            if (selectedIndex === currentQ.correct) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                // Подсвечиваем правильный ответ зелёным
                allButtons[currentQ.correct].classList.add('correct');
            }

            // Обновляем текущее количество правильных ответов на панели
            document.querySelector('.score-track').innerText = `Правильно: ${score}`;
            // Показываем кнопку перехода к следующему вопросу
            document.getElementById('next-button').style.display = 'block';
        }

        // Переход к следующему вопросу
        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion();
        }

        // Переключение тем через вкладки
        function switchTheme(themeNum) {
            currentTheme = themeNum;
            currentQuestionIndex = 0;
            score = 0;

            // Обновление активного класса на кнопках табов
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((tab, index) => {
                if (index + 1 === themeNum) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            renderQuestion();
        }

        // Финальный экран результатов для конкретной темы
        function renderResults() {
            const questions = questionsData[currentTheme];
            quizCard.innerHTML = `
                <div class="result-screen">
                    <h2>Тестирование по Теме ${currentTheme} завершено!</h2>
                    <div class="result-score">${score} / ${questions.length}</div>
                    <p>Отличный результат работы с медицинской базой данных!</p>
                    <button class="restart-btn" onclick="switchTheme(${currentTheme})">Пройти заново</button>
                </div>
            `;
        }

        // Первичный запуск при открытии страницы
        renderQuestion();
    </script>
</body>
</html>
