<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный Медицинский Тренажер</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --success-color: #10b981;
            --success-bg: #f0fdf4;
            --success-border: #34d399;
            --error-color: #ef4444;
            --error-bg: #fff5f5;
            --error-border: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 32px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .option-item { position: relative; }

        .option-item input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: #fafafa;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-item:hover .option-label { background-color: #f3f4f6; }

        /* Стили для мгновенной подсветки правильных и неправильных ответов */
        .option-item.correct-answer .option-label {
            background-color: var(--success-bg) !important;
            border-color: var(--success-border) !important;
            color: var(--success-color) !important;
            font-weight: 600;
        }

        .option-item.wrong-answer .option-label {
            background-color: var(--error-bg) !important;
            border-color: var(--error-border) !important;
            color: var(--error-color) !important;
            font-weight: 600;
        }

        /* Если ответ уже проверен, выключаем курсор на остальных кнопках */
        .options-container.checked .option-item input[type="radio"] {
            cursor: not-allowed;
            pointer-events: none;
        }

        .navigation-box { display: flex; justify-content: space-between; gap: 16px; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary { background-color: #e5e7eb; color: var(--text-muted); }
        .btn-primary { background-color: var(--primary-color); color: white; margin-left: auto; }
        .btn-primary:disabled { background-color: #cbd5e0; cursor: not-allowed; }

        .result-screen { display: none; text-align: center; }
        .result-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--success-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success-color);
            margin: 20px auto;
        }
        .restart-btn {
            background-color: var(--text-main);
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>

    let currentStep = 0;
    let userAnswers = new Array(quizQuestions.length).fill(null);
    let isChecked = false; // Флаг: проверен ли текущий вопрос

    function renderQuestion() {
        isChecked = false;
        const currentQuestion = quizQuestions[currentStep];
        
        document.getElementById('questionNumber').textContent = `Вопрос ${currentStep + 1} из ${quizQuestions.length}`;
        document.getElementById('questionText').textContent = currentQuestion.question;

        const progressPercent = (currentStep / quizQuestions.length) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';

        const prevBtn = document.getElementById('prevBtn');
        prevBtn.style.opacity = currentStep === 0 ? '0' : '1';
        prevBtn.disabled = currentStep === 0;

        const nextBtn = document.getElementById('nextBtn');
        nextBtn.textContent = currentStep === quizQuestions.length - 1 ? 'Проверить результат' : 'Дальше';
        nextBtn.disabled = true; // Блокируем кнопку "Дальше" до момента выбора

        const optionsForm = document.getElementById('optionsForm');
        optionsForm.className = 'options-container'; 
        optionsForm.innerHTML = '';

        currentQuestion.options.forEach((option, index) => {
            const optionItem = document.createElement('div');
            optionItem.className = 'option-item';
            optionItem.id = 'item_' + index;

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'quiz_option';
            input.id = 'opt_' + index;
            input.value = option;

            // Обработчик МГНОВЕННОГО клика
            input.addEventListener('change', function() {
                if (isChecked) return; 
                isChecked = true;
                userAnswers[currentStep] = this.value;

                // Блокируем форму от повторных кликов
                optionsForm.classList.add('checked');

                // Подсвечиваем результаты
                currentQuestion.options.forEach((opt, idx) => {
                    const item = document.getElementById('item_' + idx);
                    if (opt === currentQuestion.correctAnswer) {
                        item.classList.add('correct-answer'); // Правильный - зеленым
                    } else if (opt === this.value) {
                        item.classList.add('wrong-answer'); // Неправильный выбор пользователя - красным
                    }
                });

                nextBtn.disabled = false; // Разрешаем идти дальше
            });

            const label = document.createElement('label');
            label.className = 'option-label';
            label.htmlFor = 'opt_' + index;
            label.textContent = option;

            optionItem.appendChild(input);
            optionItem.appendChild(label);
            optionsForm.appendChild(optionItem);
        });
    }

    function goNext() {
        if (currentStep < quizQuestions.length - 1) {
            currentStep++;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            showResults();
        }
    }

    function goBack() {
        if (currentStep > 0) {
            currentStep--;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function showResults() {
        let correctCount = 0;
        quizQuestions.forEach((q, index) => {
            if (userAnswers[index] === q.correctAnswer) correctCount++;
        });

        const scorePercent = Math.round((correctCount / quizQuestions.length) * 100);
        document.getElementById('quizWindow').style.display = 'none';
        document.getElementById('resultScore').textContent = `Вы ответили правильно на ${correctCount} из ${quizQuestions.length} вопросов.`;
        document.getElementById('resultCircle').textContent = scorePercent + '%';
        document.getElementById('resultScreen').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartQuiz() {
        currentStep = 0;
        userAnswers = new Array(quizQuestions.length).fill(null);
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('quizWindow').style.display = 'block';
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('DOMContentLoaded', renderQuestion);
</script>
</body>
</html>
