        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }

        .result-screen { display: none; text-align: center; }
        .result-circle { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--ok); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 800; color: var(--ok); margin: 20px auto; }

    // Умная функция тасования вариантов (алгоритм Фишера-Йетса)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Разворачиваем сжатую базу с автоматическим перемешиванием ответов на лету
    let quizQuestions = rawData.map(item => {
        const rawOptions = item[1].split('|');
        const correctText = rawOptions[item[2]]; // Сохраняем текст верного ответа

        // Перемешиваем варианты
        const shuffledOptions = shuffleArray([...rawOptions]);

        return {
            type: shuffledOptions.length === 2 ? "boolean" : "select",
            question: item[0],
            options: shuffledOptions,
            correctAnswer: correctText // Правильный ответ теперь определяется по тексту, а не по индексу
        };
    });

    let currentStep = 0;
    let userAnswers = new Array(quizQuestions.length).fill(null);
    let isChecked = false;
    let totalCorrectCalculated = 0;
    let totalAnsweredCalculated = 0;

    function renderQuestion() {
        isChecked = false;
        const currentQuestion = quizQuestions[currentStep];
        
        document.getElementById('questionNumber').textContent = `Вопрос ${currentStep + 1} из ${quizQuestions.length}`;
        document.getElementById('questionText').textContent = currentQuestion.question;

        const progressPercent = (currentStep / quizQuestions.length) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';

        updateLiveScore();

        const prevBtn = document.getElementById('prevBtn');
        prevBtn.style.opacity = currentStep === 0 ? '0' : '1';
        prevBtn.disabled = currentStep === 0;

        const nextBtn = document.getElementById('nextBtn');
        nextBtn.textContent = currentStep === quizQuestions.length - 1 ? 'Проверить результат' : 'Дальше';
        nextBtn.disabled = userAnswers[currentStep] === null;

        const optionsForm = document.getElementById('optionsForm');
        optionsForm.className = 'options-container';
        optionsForm.innerHTML = '';

        if (userAnswers[currentStep] !== null) {
            optionsForm.classList.add('lock');
            isChecked = true;
            nextBtn.disabled = false;
        }

        currentQuestion.options.forEach((option, index) => {
            const optionItem = document.createElement('div');
            optionItem.className = 'option-item';
            optionItem.id = 'item_' + index;

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'quiz_option';
            input.id = 'opt_' + index;
            input.value = option;

            if (userAnswers[currentStep] === option) {
                input.checked = true;
            }

            if (userAnswers[currentStep] !== null) {
                if (option === currentQuestion.correctAnswer) {
                    optionItem.classList.add('correct');
                } else if (option === userAnswers[currentStep]) {
                    optionItem.classList.add('wrong');
                }
            }

            input.addEventListener('change', function() {
                if (isChecked) return;
                isChecked = true;
                userAnswers[currentStep] = this.value;

                optionsForm.classList.add('lock');

                if (this.value === currentQuestion.correctAnswer) {
                    totalCorrectCalculated++;
                }
                totalAnsweredCalculated++;

                currentQuestion.options.forEach((opt, idx) => {
                    const item = document.getElementById('item_' + idx);
                    if (opt === currentQuestion.correctAnswer) {
                        item.classList.add('correct');
                    } else if (opt === this.value) {
                        item.classList.add('wrong');
                    }
                });

                updateLiveScore();
                nextBtn.disabled = false;
            });

            const label = document.createElement('label');
            label.className = 'option-label';
            label.htmlFor = 'opt_' + index;
            label.textContent = option;

            optionItem.appendChild(input);
            optionItem.appendChild(label);
            optionsForm.appendChild(optionItem);
        });
    }

    function updateLiveScore() {
        if (totalAnsweredCalculated === 0) {
            document.getElementById('liveScore').textContent = `Успеваемость: 0%`;
        } else {
            const currentPercent = Math.round((totalCorrectCalculated / totalAnsweredCalculated) * 100);
            document.getElementById('liveScore').textContent = `Правильно: ${totalCorrectCalculated}/${totalAnsweredCalculated} (${currentPercent}%)`;
        }
    }

    function goNext() {
        if (currentStep < quizQuestions.length - 1) {
            currentStep++;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            showResults();
        }
    }

    function goBack() {
        if (currentStep > 0) {
            currentStep--;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function showResults() {
        let finalCorrect = 0;
        quizQuestions.forEach((q, index) => {
            if (userAnswers[index] === q.correctAnswer) finalCorrect++;
        });

        const scorePercent = Math.round((finalCorrect / quizQuestions.length) * 100);
        document.getElementById('quizWindow').style.display = 'none';
        document.getElementById('resultScore').textContent = `Вы ответили правильно на ${finalCorrect} из ${quizQuestions.length} вопросов.`;
        document.getElementById('resultCircle').textContent = scorePercent + '%';
        document.getElementById('resultScreen').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartQuiz() {
        currentStep = 0;
        totalCorrectCalculated = 0;
        totalAnsweredCalculated = 0;
        userAnswers = new Array(quizQuestions.length).fill(null);
        
        // Перемешиваем заново при перезапуске теста
        quizQuestions = rawData.map(item => {
            const rawOptions = item[1].split('|');
            const correctText = rawOptions[item[2]];
            const shuffledOptions = shuffleArray([...rawOptions]);
            return {
                type: shuffledOptions.length === 2 ? "boolean" : "select",
                question: item[0],
                options: shuffledOptions,
                correctAnswer: correctText
            };
        });

        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('quizWindow').style.display = 'block';
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('DOMContentLoaded', renderQuestion);
</script>
